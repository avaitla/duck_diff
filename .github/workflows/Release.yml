#
# On a GitHub Release, builds duck_diff for all native platforms, signs each
# binary with the DUCKDB_EXTENSION_SIGNING_PK secret, and attaches the signed
# .duckdb_extension files (plus SHA256SUMS) to the release as assets.
#
# Users download the file for their platform and load it:
#   duckdb -unsigned
#   LOAD '/path/to/duck_diff-<duckdb_version>-<platform>.duckdb_extension';
#
name: Release (signed binaries)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  DUCKDB_VERSION: v1.5.3
  EXTENSION_NAME: duck_diff

jobs:
  build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.3
      ci_tools_version: v1.5-variegata
      extension_name: duck_diff
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads'

  publish:
    name: Sign and attach to the release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all built extensions
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ${{ env.EXTENSION_NAME }}-*-extension-*

      - name: Sign each binary
        env:
          DUCKDB_EXTENSION_SIGNING_PK: ${{ secrets.DUCKDB_EXTENSION_SIGNING_PK }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          if [ -n "${DUCKDB_EXTENSION_SIGNING_PK:-}" ]; then
            printf '%s' "$DUCKDB_EXTENSION_SIGNING_PK" > private.pem
          fi
          mkdir -p dist
          for dir in artifacts/${EXTENSION_NAME}-*-extension-*; do
            arch="${dir##*-extension-}"
            src="$dir/${EXTENSION_NAME}.duckdb_extension"
            if [ ! -f "$src" ]; then
              echo "skip: no extension in $dir"; continue
            fi
            # the built extension ends in a 256-byte signature slot; sign the
            # body and overwrite that slot (the result stays a loadable file).
            size=$(wc -c < "$src")
            body=$((size - 256))
            head -c "$body" "$src" > body.bin
            : > hash_concats
            split -b 1M body.bin seg_
            for f in seg_*; do openssl dgst -binary -sha256 "$f" >> hash_concats; rm "$f"; done
            openssl dgst -binary -sha256 hash_concats > ext.hash
            rm -f hash_concats
            if [ -f private.pem ]; then
              openssl pkeyutl -sign -in ext.hash -inkey private.pem -pkeyopt digest:sha256 -out ext.sign
            else
              : > ext.sign   # no key -> leave an empty (zeroed) signature slot
            fi
            truncate -s 256 ext.sign
            cat body.bin ext.sign > "dist/${EXTENSION_NAME}-${DUCKDB_VERSION}-${arch}.duckdb_extension"
            rm -f body.bin ext.hash ext.sign
            echo "signed ${arch}"
          done
          rm -f private.pem
          ( cd dist && sha256sum * > SHA256SUMS )
          echo "=== SHA256SUMS ==="; cat dist/SHA256SUMS

      - name: Attach signed binaries and notes to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}   # no checkout, so gh can't infer the repo
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" dist/* --clobber
          {
            echo "**duck_diff** — a DuckDB extension for diffing two relations on a primary key."
            echo
            echo "**Functions:** \`table_diff\`, \`table_diff_summary\`, \`tables_equal\`, \`schema_diff\`."
            echo
            echo "### Install"
            echo
            echo "Download the binary for your platform and save it as \`${EXTENSION_NAME}.duckdb_extension\` — DuckDB derives the extension name (and entrypoint) from the filename:"
            echo
            echo '```sh'
            echo "curl -L -o ${EXTENSION_NAME}.duckdb_extension \\\\"
            echo "  https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${EXTENSION_NAME}-${DUCKDB_VERSION}-<platform>.duckdb_extension"
            echo "duckdb -unsigned   # allow_unsigned_extensions is a launch flag, not a SET"
            echo '```'
            echo "Ensure you use the Full File path below:"
            echo '```sql'
            echo "LOAD '${EXTENSION_NAME}.duckdb_extension';"
            echo 'FROM table_diff(...);'
            echo '```'
            echo
            echo "### Provenance & integrity"
            echo
            echo "Built for **DuckDB ${DUCKDB_VERSION}** from commit \`${GITHUB_SHA}\`."
            echo "Verify against the public key (\`duck_diff-signing-key.pub\`) — see [docs/DISTRIBUTION.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/DISTRIBUTION.md). SHA256 of each binary:"
            echo
            echo '```'
            cat dist/SHA256SUMS
            echo '```'
          } > notes.md
          gh release edit "$TAG" --notes-file notes.md
